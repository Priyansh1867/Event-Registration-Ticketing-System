<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Ticket</title>
    <link rel="stylesheet" href="css/styless.css">
    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
    <style>
        .verify-container {
            max-width: 500px;
            margin: 100px auto;
            text-align: center;
        }
        .status-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }
        .details p {
            margin: 0.5rem 0;
            font-size: 1.1rem;
        }
        .loading-spinner {
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-left-color: #818cf8;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="particles-js"></div>
    <nav class="navbar">
        <h1>🎟 Ticket Verification</h1>
        <div class="nav-links">
            <a href="index.html">Back to Home</a>
        </div>
    </nav>

    <div class="container verify-container">
        <div class="card" id="verificationCard">
            <div id="loadingState">
                <div class="loading-spinner"></div>
                <h2>Verifying Ticket...</h2>
                <p>Please wait while we check this ticket securely.</p>
            </div>
            
            <div id="resultState" style="display: none;">
                <!-- Filled via JS -->
            </div>
        </div>
    </div>

    <script src="js/verify.js"></script>
    <script>
        particlesJS('particles-js', {
            "particles": {
                "number": { "value": 50, "density": { "enable": true, "value_area": 800 } },
                "color": { "value": "#818cf8" },
                "shape": { "type": "circle" },
                "opacity": { "value": 0.3, "random": true },
                "size": { "value": 4, "random": true },
                "line_linked": { "enable": true, "distance": 150, "color": "#a855f7", "opacity": 0.2, "width": 1 },
                "move": { "enable": true, "speed": 1 }
            },
            "retina_detect": true
        });
    </script>
</body>
</html>
