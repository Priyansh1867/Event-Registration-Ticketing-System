<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Ticket</title>
    <link rel="stylesheet" href="css/admin-dashboard.css">
    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
    <style>
        .verify-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 10px;
            padding: 30px;
            text-align: center;
            max-width: 500px;
            margin: 50px auto;
            color: #fff;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }
        .valid {
            border: 2px solid #34d399;
        }
        .invalid {
            border: 2px solid #ef4444;
        }
        .ticket-details p {
            margin: 10px 0;
            font-size: 1.1em;
        }
    </style>
</head>
<body>
    <div id="particles-js"></div>
    <header class="admin-header">
        <h1>Ticket Verification 🎫</h1>
        <button id="dashboardBtn" class="logout-btn" onclick="window.location.href='admin-dashboard.html'">Back to Dashboard</button>
    </header>

    <div class="content-wrapper">
        <div id="verify-result" class="verify-card">
            <h2>Verifying Ticket...</h2>
            <p>Please wait while we check our records.</p>
        </div>
    </div>

    <script src="js/verify.js"></script>
</body>
</html>
