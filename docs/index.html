<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Events</title>
  <link rel="stylesheet" href="css/styless.css">
</head>
<body>
  
  <div id="particles-js"></div>
  <nav class="navbar">
    <h1>🎟 Event Registration</h1>
    <div class="nav-links">
      <a href="index.html">Events</a>
      <a href="login.html" id="loginLink">Login</a>
      <a href="register.html" id="registerLink">Register</a>
      <a href="dashboard.html" id="dashboardLink" style="display:none;">Dashboard</a>
      <a href="profile.html" id="profileLink" style="display:none;">Profile</a>
      <button id="logoutBtn" style="display:none;">Logout</button>
    </div>
  </nav>

  <div class="container">
    <h2>Available Events</h2>
    <div id="eventsList" class="grid">
      <!-- Sample event cards -->
      <div class="card">
        <h3>Web Development Workshop</h3>
        <p><strong>Date:</strong> 20 Sept 2025</p>
        <p><strong>Location:</strong> Online</p>
        <button>Register</button>
      </div>

      <div class="card">
        <h3>AI & Machine Learning Seminar</h3>
        <p><strong>Date:</strong> 25 Sept 2025</p>
        <p><strong>Location:</strong> New Delhi</p>
        <button>Register</button>
      </div>

      <div class="card">
        <h3>Startup Pitch Fest</h3>
        <p><strong>Date:</strong> 30 Sept 2025</p>
        <p><strong>Location:</strong> Mumbai</p>
        <button>Register</button>
      </div>
    </div>
  </div>

<script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.0/vanilla-tilt.min.js"></script>
    <script>
        particlesJS('particles-js', {
            "particles": {
                "number": { "value": 50, "density": { "enable": true, "value_area": 800 } },
                "color": { "value": "#818cf8" },
                "shape": { "type": "circle" },
                "opacity": { "value": 0.3, "random": true },
                "size": { "value": 4, "random": true },
                "line_linked": { "enable": true, "distance": 150, "color": "#a855f7", "opacity": 0.2, "width": 1 },
                "move": { "enable": true, "speed": 1 }
            },
            "retina_detect": true
        });
    </script>
  <script src="js/navbar.js"></script>
  <script src="js/events.js"></script>
</body>
</html>
